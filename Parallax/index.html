<!DOCTYPE html>
<html lang="en">

<head>
    <title>Freecell</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A little game made in html and javascript">
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="favicon.ico" />
    <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Open Sans Condensed', sans-serif;
            color: white;
            background: url('10_Sky.png');
            background-size: auto;
        }

        article {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        section {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            background-size: cover;
            background-repeat: repeat-x;
            animation-name: MOVE-BG;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
        }

        #layer1 {
            background-image: url('01_Mist.png');
            animation-duration: 10s;
            animation-timing-function: ease;
        }

        #layer2 {
            background-image: url('02_Bushes.png');
            animation-duration: 15s;
        }

        #layer3 {
            background-image: url('03_Particles.png');
            animation-duration: 20s;
            animation-timing-function: ease-in-out;
        }

        #layer4 {
            background-image: url('04_Forest.png');
            animation-duration: 25s;
        }

        #layer5 {
            background-image: url('05_Particles.png');
            animation-duration: 30s;
            animation-timing-function: ease-in-out;
        }

        #layer6 {
            background-image: url('06_Forest.png');
            animation-duration: 35s;
        }

        #layer7 {
            background-image: url('07_Forest.png');
            animation-duration: 40s;
        }

        #layer8 {
            background-image: url('08_Forest.png');
            animation-duration: 45s;
        }

        #layer9 {
            background-image: url('09_Forest.png');
            animation-duration: 50s;
        }


        h1 {
            position: relative;
            font-size: 4vw;
            font-weight: normal;
            font-family: 'Bangers', cursive;
            text-shadow: 0 0 32px white;
            color: black;
        }

        @keyframes MOVE-BG {
            from {
                background-position-x: 0;
            }

            to {
                background-position-x: 1920px;
            }
        }
    </style>
</head>

<body>
    <article id="parallax">
        <section id="layer9"></section>
        <section id="layer8"></section>
        <section id="layer7"></section>
        <section id="layer6"></section>
        <section id="layer5"></section>
        <section id="layer4"></section>
        <section id="layer3"></section>
        <section id="layer2"></section>
        <section id="layer1"></section>
        <h1>Parallax 3D in 2D</h1>
    </article>
</body>

</html>
