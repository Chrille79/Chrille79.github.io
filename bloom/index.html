<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bloom Visualizer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
    }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    h1 {
      text-align: center;
      margin-bottom: 0.5rem;
      font-size: 1.25rem;
      color: #e0c0ff;
      flex-shrink: 0;
    }
    bloom-visualizer {
      flex: 1;
      min-height: 0;
    }
  </style>
</head>
<body>
  <h1>Bloom Visualizer</h1>
  <bloom-visualizer></bloom-visualizer>

  <script>
    class BloomVisualizer extends HTMLElement {
      constructor() {
        super();
        this.attachShadow({ mode: 'open' });
        this._image = null;
        this._luminance = 0.5;
        this._blurPasses = 3;
      }

      connectedCallback() {
        this.render();
        this.setupEvents();
        this.loadTestImage();
      }

      render() {
        this.shadowRoot.innerHTML = `
          <style>
            :host {
              display: block;
              height: 100%;
            }

            .container {
              display: grid;
              grid-template-columns: repeat(4, 1fr);
              gap: 0.75rem;
              height: 100%;
            }

            .section {
              background: #16213e;
              border-radius: 12px;
              padding: 0.75rem;
              border: 1px solid #0f3460;
              display: flex;
              flex-direction: column;
              min-height: 0;
              overflow: hidden;
            }

            @media (max-width: 1000px) {
              .container {
                grid-template-columns: repeat(2, 1fr);
                grid-template-rows: 1fr 1fr;
              }
            }

            @media (max-width: 500px) {
              .container {
                grid-template-columns: 1fr;
                grid-template-rows: repeat(4, 1fr);
              }
            }

            .section h2 {
              font-size: 0.95rem;
              margin-bottom: 0.75rem;
              color: #a78bfa;
              font-weight: 600;
            }

            .canvas-wrapper {
              width: 100%;
              flex: 1;
              min-height: 0;
              background: #0a0a1a;
              border-radius: 8px;
              overflow: hidden;
              display: flex;
              align-items: center;
              justify-content: center;
              position: relative;
            }

            canvas {
              max-width: 100%;
              max-height: 100%;
              display: block;
            }

            .upload-area {
              width: 100%;
              flex: 1;
              min-height: 0;
              background: #0a0a1a;
              border: 2px dashed #0f3460;
              border-radius: 8px;
              display: flex;
              flex-direction: column;
              align-items: center;
              justify-content: center;
              cursor: pointer;
              transition: border-color 0.2s, background 0.2s;
            }

            .upload-area:hover {
              border-color: #a78bfa;
              background: #111833;
            }

            .upload-area.has-image {
              border-style: solid;
              border-color: #0f3460;
              cursor: pointer;
            }

            .upload-area .icon {
              font-size: 2.5rem;
              margin-bottom: 0.5rem;
              opacity: 0.6;
            }

            .upload-area .text {
              font-size: 0.85rem;
              opacity: 0.6;
            }

            .upload-area canvas {
              max-width: 100%;
              max-height: 100%;
            }

            input[type="file"] {
              display: none;
            }

            .controls {
              flex-shrink: 0;
              margin-top: 0.5rem;
              display: flex;
              align-items: center;
              gap: 0.75rem;
            }

            .controls label {
              font-size: 0.8rem;
              white-space: nowrap;
              color: #c4b5fd;
            }

            .controls input[type="range"] {
              flex: 1;
              accent-color: #a78bfa;
              height: 6px;
            }

            .controls .value {
              font-size: 0.8rem;
              min-width: 2.5rem;
              text-align: right;
              font-variant-numeric: tabular-nums;
              color: #e0c0ff;
            }

            .placeholder {
              color: #444;
              font-size: 0.85rem;
              text-align: center;
            }
          </style>

          <div class="container">
            <!-- Section 1: Upload -->
            <div class="section">
              <h2>1. Ladda upp bild</h2>
              <div class="upload-area" id="uploadArea">
                <span class="icon">&#128247;</span>
                <span class="text">Klicka eller dra en bild hit</span>
              </div>
              <input type="file" id="fileInput" accept="image/*">
            </div>

            <!-- Section 2: Luminance -->
            <div class="section">
              <h2>2. Luminance-tröskel</h2>
              <div class="canvas-wrapper">
                <canvas id="luminanceCanvas"></canvas>
                <span class="placeholder" id="lumPlaceholder">Ladda upp en bild först</span>
              </div>
              <div class="controls">
                <label>Tröskel</label>
                <input type="range" id="luminanceSlider" min="0" max="1" step="0.01" value="0.5">
                <span class="value" id="luminanceValue">0.50</span>
              </div>
            </div>

            <!-- Section 3: Gaussian Blur -->
            <div class="section">
              <h2>3. Gaussian Blur</h2>
              <div class="canvas-wrapper">
                <canvas id="blurCanvas"></canvas>
                <span class="placeholder" id="blurPlaceholder">Ladda upp en bild först</span>
              </div>
              <div class="controls">
                <label>Blur-pass</label>
                <input type="range" id="blurSlider" min="1" max="5" step="1" value="3">
                <span class="value" id="blurValue">3</span>
              </div>
            </div>

            <!-- Section 4: Result -->
            <div class="section">
              <h2>4. Slutresultat</h2>
              <div class="canvas-wrapper">
                <canvas id="resultCanvas"></canvas>
                <span class="placeholder" id="resultPlaceholder">Ladda upp en bild först</span>
              </div>
            </div>
          </div>
        `;
      }

      setupEvents() {
        const root = this.shadowRoot;
        const uploadArea = root.getElementById('uploadArea');
        const fileInput = root.getElementById('fileInput');
        const luminanceSlider = root.getElementById('luminanceSlider');
        const blurSlider = root.getElementById('blurSlider');

        uploadArea.addEventListener('click', () => {
          fileInput.value = '';
          fileInput.click();
        });

        uploadArea.addEventListener('dragover', (e) => {
          e.preventDefault();
          e.stopPropagation();
        });

        uploadArea.addEventListener('drop', (e) => {
          e.preventDefault();
          e.stopPropagation();
          const file = e.dataTransfer.files[0];
          if (file && file.type.startsWith('image/')) this.loadImage(file);
        });

        fileInput.addEventListener('change', (e) => {
          const file = e.target.files[0];
          if (file) this.loadImage(file);
        });

        luminanceSlider.addEventListener('input', (e) => {
          this._luminance = parseFloat(e.target.value);
          root.getElementById('luminanceValue').textContent = this._luminance.toFixed(2);
          if (this._image) this.process();
        });

        blurSlider.addEventListener('input', (e) => {
          this._blurPasses = parseInt(e.target.value);
          root.getElementById('blurValue').textContent = this._blurPasses;
          if (this._image) this.process();
        });
      }

      }

      loadImage(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => this.setImage(img);
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      }

      setImage(img) {
        this._image = img;
        this.showUploadPreview(img);
        this.process();
      }

      showUploadPreview(img) {
        const root = this.shadowRoot;
        const uploadArea = root.getElementById('uploadArea');
        uploadArea.classList.add('has-image');

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0);

        uploadArea.innerHTML = '';
        uploadArea.appendChild(canvas);
      }

      process() {
        const root = this.shadowRoot;
        const img = this._image;
        const w = img.width;
        const h = img.height;

        // Hide placeholders
        root.getElementById('lumPlaceholder').style.display = 'none';
        root.getElementById('blurPlaceholder').style.display = 'none';
        root.getElementById('resultPlaceholder').style.display = 'none';

        // Get source pixels
        const srcCanvas = document.createElement('canvas');
        srcCanvas.width = w;
        srcCanvas.height = h;
        const srcCtx = srcCanvas.getContext('2d');
        srcCtx.drawImage(img, 0, 0);
        const srcData = srcCtx.getImageData(0, 0, w, h);

        // Step 1: Luminance threshold
        const lumData = this.applyLuminanceThreshold(srcData, this._luminance);
        const lumCanvas = root.getElementById('luminanceCanvas');
        lumCanvas.width = w;
        lumCanvas.height = h;
        lumCanvas.getContext('2d').putImageData(lumData, 0, 0);

        // Step 2: Gaussian blur on luminance-filtered image
        const blurredData = this.applyGaussianBlur(lumData, w, h, this._blurPasses);
        const blurCanvas = root.getElementById('blurCanvas');
        blurCanvas.width = w;
        blurCanvas.height = h;
        blurCanvas.getContext('2d').putImageData(blurredData, 0, 0);

        // Step 3: Composite original + bloom
        const resultData = this.composite(srcData, blurredData);
        const resultCanvas = root.getElementById('resultCanvas');
        resultCanvas.width = w;
        resultCanvas.height = h;
        resultCanvas.getContext('2d').putImageData(resultData, 0, 0);
      }

      applyLuminanceThreshold(imageData, threshold) {
        const src = imageData.data;
        const out = new ImageData(imageData.width, imageData.height);
        const dst = out.data;

        for (let i = 0; i < src.length; i += 4) {
          const r = src[i] / 255;
          const g = src[i + 1] / 255;
          const b = src[i + 2] / 255;
          // Relative luminance (BT.709)
          const lum = 0.2126 * r + 0.7152 * g + 0.0722 * b;

          if (lum >= threshold) {
            dst[i] = src[i];
            dst[i + 1] = src[i + 1];
            dst[i + 2] = src[i + 2];
            dst[i + 3] = 255;
          } else {
            dst[i] = 0;
            dst[i + 1] = 0;
            dst[i + 2] = 0;
            dst[i + 3] = 255;
          }
        }
        return out;
      }

      applyGaussianBlur(imageData, w, h, passes) {
        // Use CanvasRenderingContext2D filter for performant gaussian blur
        const canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.putImageData(imageData, 0, 0);

        // Each pass increases blur radius; compound them
        const blurRadius = passes * 8;

        const blurCanvas = document.createElement('canvas');
        blurCanvas.width = w;
        blurCanvas.height = h;
        const blurCtx = blurCanvas.getContext('2d');
        blurCtx.filter = `blur(${blurRadius}px)`;
        blurCtx.drawImage(canvas, 0, 0);

        return blurCtx.getImageData(0, 0, w, h);
      }

      composite(original, bloom) {
        const src = original.data;
        const blm = bloom.data;
        const out = new ImageData(original.width, original.height);
        const dst = out.data;

        for (let i = 0; i < src.length; i += 4) {
          // Additive blending (screen-like) clamped to 255
          dst[i] = Math.min(255, src[i] + blm[i]);
          dst[i + 1] = Math.min(255, src[i + 1] + blm[i + 1]);
          dst[i + 2] = Math.min(255, src[i + 2] + blm[i + 2]);
          dst[i + 3] = 255;
        }
        return out;
      }
    }

    customElements.define('bloom-visualizer', BloomVisualizer);
  </script>
