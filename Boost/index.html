<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Boost</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #0b0f14;
        font-family: system-ui, sans-serif;
      }
      #app {
        width: 100vw;
        height: 100vh;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      #stats {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        display: flex;
        gap: 20px;
        padding: 6px 14px;
        background: rgba(8, 12, 18, 0.55);
        backdrop-filter: blur(3px);
        -webkit-backdrop-filter: blur(3px);
        color: #aeb9c6;
        font: 12px/1.4 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        pointer-events: none;
        user-select: none;
        white-space: nowrap;
      }
      #stats b {
        color: #fff;
        font-weight: 600;
      }
      #stats .lo b {
        color: #ff8a8a;
      }
      #hud {
        position: fixed;
        left: 16px;
        bottom: 16px;
        color: #fff;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.7);
        font-size: 14px;
        line-height: 1.5;
        pointer-events: none;
        user-select: none;
      }
      #hud b {
        font-size: 20px;
      }
      #race {
        position: fixed;
        top: 36px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 22px;
        padding: 8px 18px;
        background: rgba(8, 12, 18, 0.55);
        backdrop-filter: blur(3px);
        -webkit-backdrop-filter: blur(3px);
        border-radius: 10px;
        color: #cdd6e0;
        font: 13px/1.2 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        pointer-events: none;
        user-select: none;
        text-align: center;
      }
      #race .k {
        display: block;
        font-size: 10px;
        letter-spacing: 0.08em;
        color: #8aa0b0;
        text-transform: uppercase;
      }
      #race b {
        font-size: 18px;
        color: #fff;
        font-variant-numeric: tabular-nums;
      }
      #race .best b {
        color: #ffd76a;
      }
      #countdown {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font: 800 120px/1 system-ui, sans-serif;
        color: #fff;
        text-shadow: 0 4px 24px rgba(0, 0, 0, 0.6);
        pointer-events: none;
        user-select: none;
      }
      #countdown:empty {
        display: none;
      }
      #error {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 32px;
        color: #ffb4b4;
        background: #0b0f14;
        text-align: center;
        font-size: 16px;
      }
    </style>
    <script type="module" crossorigin src="/Boost/assets/main-CNdfIr9E.js"></script>
    <link rel="modulepreload" crossorigin href="/Boost/assets/projection-B83bLJQy.js">
    <link rel="modulepreload" crossorigin href="/Boost/assets/default-BlGe3L3v.js">
  </head>
  <body>
    <div id="app">
      <canvas id="gpu-canvas"></canvas>
    </div>
    <div id="stats">
      <span id="stat-fps"><b>–</b> fps</span>
      <span><b id="stat-ms">–</b> ms cpu</span>
      <span><b id="stat-gpu">–</b> ms gpu</span>
      <span><b id="stat-draws">–</b> draws</span>
      <span><b id="stat-inst">–</b> instances</span>
      <span><b id="stat-tris">–</b> triangles</span>
    </div>
    <div id="race">
      <div><span class="k">Lap</span><b id="lap">1</b></div>
      <div><span class="k">Time</span><b id="laptime">0.000</b></div>
      <div class="best"><span class="k">Best</span><b id="best">—</b></div>
      <div><span class="k">Boost</span><b id="boost">—</b></div>
    </div>
    <div id="countdown"></div>
    <div id="hud">
      <div><b id="speed">0</b> km/h &nbsp; <span id="status"></span></div>
      <div>WASD to drive &middot; Space to boost &middot; R to restart</div>
    </div>
    <div id="error"></div>
  </body>
</html>
